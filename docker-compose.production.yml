services:
  postgres:
    image: postgres:13-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKER_USERNAME}/kittygram_backend:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - static_volume:/app/collected_static
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ${DOCKER_USERNAME}/kittygram_frontend:latest
    volumes:
      - static_volume:/static_files
    entrypoint: sh -c "cp -r /app/build/. /static_files/ && exit 0"

  gateway:
    image: ${DOCKER_USERNAME}/kittygram_gateway:latest
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-9000}:80"
    volumes:
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  static_volume:
  media_volume:
